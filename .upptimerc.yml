# Upptime config — Media Tracker status page
# Docs: https://upptime.js.org/docs/configuration

# Change these two to match the repo you create in step 1 below.
owner: robwalker96   # e.g. robsnano
repo: status                  # the repo you create from the Upptime template

sites:
  - name: Media Tracker
    url: https://media-tracker.app
    # Optional: treat only 200 as healthy (default already accepts 2xx)
    # expectedStatusCodes:
    #   - 200
  - name: Supabase API
    url: https://cihwaiuixdeugpzsjkxj.supabase.co/auth/v1/health

status-website:
  cname: status.media-tracker.app   # optional custom domain — see step 5. Delete this line to use the default *.github.io URL.
  name: Media Tracker Status
  introMessage: >-
    This is the live status page for **Media Tracker**. Checks run every
    5 minutes from GitHub's infrastructure, independent of our own servers.
  navbar:
    - title: Status
      href: /
    - title: Media Tracker
      href: https://media-tracker.app

# Nice-to-haves
assignees:
  - robwalker96   # auto-assign incident issues to you

# How long a site must be unresponsive before an incident issue opens (minutes)
delay: 5
